<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact • Pulse Magazine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./print-styles.css" media="print" />
  </head>
  <body data-page="contact">
    <div id="siteHeader"></div>

    <main>
      <section class="section">
        <div class="container">
          <div class="page-card">
            <h1>Contact</h1>
            <p class="muted">
              Partnerships, feedback, or story tips—send us a message.
            </p>

            <form id="contactForm" class="form">
              <label>
                Name
                <input type="text" name="name" required />
              </label>
              <label>
                Email
                <input type="email" name="email" required />
              </label>
              <label>
                Message
                <textarea name="message" rows="5" required></textarea>
              </label>
              <button class="btn" type="submit">Send message</button>
            </form>

            <p id="contactMessage" class="form-message" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>
    <script src="./app.js"></script>
  </body>
</html>
